<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Agent Sandbox</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-mesh"></div>
    <div class="container">
        <header>
            <h1><i class="fa-solid fa-list-check"></i> Task Manager</h1>
            <p>Generated by SDLC Autonomous Agentic Framework</p>
        </header>

        <!-- Task Creation Card -->
        <div class="glass-card form-section">
            <h2>Add New Task</h2>
            <form id="task-form">
                <div class="form-group">
                    <label for="task-title">Title</label>
                    <input type="text" id="task-title" placeholder="Enter task title..." required>
                </div>
                <div class="form-group">
                    <label for="task-description">Description</label>
                    <textarea id="task-description" placeholder="Enter task details (optional)..." rows="2"></textarea>
                </div>
                <div class="form-group">
                    <label for="task-priority">Priority</label>
                    <select id="task-priority">
                        <option value="Low">Low Priority</option>
                        <option value="Medium" selected>Medium Priority</option>
                        <option value="High">High Priority</option>
                    </select>
                </div>
                <button type="submit" id="add-task-btn"><i class="fa-solid fa-plus"></i> Add Task</button>
            </form>
        </div>

        <!-- Task List Section -->
        <div class="task-list-header">
            <h2>Your Tasks</h2>
            <span id="task-count">0 tasks</span>
        </div>
        <div id="tasks-container" class="task-grid">
            <!-- Dynamic task items injected here -->
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
